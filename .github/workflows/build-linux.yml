name: Build Linux

# Builds the Linux AppImage + .deb on GitHub's own Ubuntu runner (native
# Windows can't produce these — electron-builder needs real Linux packaging
# tools like mksquashfs/fpm that have no Windows equivalent).
#
# - Push a tag matching v* (the same convention used for existing releases,
#   e.g. v2.1.0): builds and attaches the AppImage/.deb to that GitHub
#   release (creating it if it doesn't exist yet).
# - Manual "Run workflow" (workflow_dispatch): builds and uploads the same
#   files as a downloadable Actions artifact, for testing without a tag/release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # --publish never: build only. electron-builder auto-detects the tag
      # and otherwise tries to publish the release itself (needs its own
      # GH_TOKEN) — we handle attaching assets ourselves in the next step.
      - run: npm run dist -- --linux --publish never

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: promptpad-linux
          path: |
            release/*.AppImage
            release/*.deb
